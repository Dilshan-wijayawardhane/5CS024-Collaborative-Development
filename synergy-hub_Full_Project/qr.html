<script src="https://unpkg.com/@zxing/library@latest"></script>
<script>
function toggleSidebar() {
    const sidebar = document.querySelector(".sidebar");
    sidebar.style.left = sidebar.style.left === "0px" ? "-260px" : "0px";
}

let codeReader = null;
let videoElement = document.getElementById('video');

function startScanner() {
    document.getElementById('video-container').style.display = 'block';
    document.querySelector('.camera-select').style.display = 'block';
    
    if (!codeReader) {
        codeReader = new ZXing.BrowserMultiFormatReader();
    }
    
    codeReader.listVideoInputDevices()
        .then(videoInputDevices => {
            const select = document.getElementById('cameraSelect');
            select.innerHTML = '';
            
            videoInputDevices.forEach(device => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.text = device.label || `Camera ${select.length + 1}`;
                select.appendChild(option);
            });
            
            if (videoInputDevices.length > 0) {
                startDecoding(videoInputDevices[0].deviceId);
            }
        })
        .catch(err => {
            console.error('Camera access error:', err);
            alert('Could not access camera. Please check permissions.');
        });
}

function startDecoding(deviceId) {
    if (codeReader) {
        codeReader.reset();
        codeReader.decodeFromVideoDevice(deviceId, 'video', (result, err) => {
            if (result) {
                // Successfully scanned
                document.getElementById('video-container').style.display = 'none';
                document.querySelector('.camera-select').style.display = 'none';
                document.querySelector('.start-btn').style.display = 'inline-block';
                
                showResult(result.text);
            }
            if (err && !(err instanceof ZXing.NotFoundException)) {
                console.error('Scan error:', err);
            }
        });
        
        document.querySelector('.start-btn').style.display = 'none';
    }
}

// Camera selection change
document.getElementById('cameraSelect').addEventListener('change', function(e) {
    if (this.value) {
        startDecoding(this.value);
    }
});

function showResult(text) {
    document.getElementById('resultContent').innerHTML = `
        <strong>Scanned:</strong> ${text}<br>
        <strong>Type:</strong> ${getQRType(text)}<br>
        <strong>Points:</strong> +10
    `;
    document.getElementById('resultBox').classList.add('show');
    
    // Simulate check-in
    setTimeout(() => {
        let points = document.querySelector('.points span');
        let currentPoints = parseInt(points.innerText);
        points.innerText = currentPoints + 10;
        
        // Animate points
        document.querySelector('.points').classList.add('active');
        setTimeout(() => {
            document.querySelector('.points').classList.remove('active');
        }, 500);
    }, 500);
}

function getQRType(text) {
    if (text.includes('GYM')) return 'Gym Facility';
    if (text.includes('LIB')) return 'Library';
    if (text.includes('CAFE')) return 'Café';
    if (text.includes('EVENT')) return 'Event';
    return 'Facility';
}

function closeResult() {
    document.getElementById('resultBox').classList.remove('show');
}

function demoScan(code) {
    showResult(code);
}

// Stop scanner when leaving page
window.addEventListener('beforeunload', function() {
    if (codeReader) {
        codeReader.reset();
    }
});

document.addEventListener("click", function(e) {
    const sidebar = document.querySelector(".sidebar");
    const btn = document.querySelector(".menu-btn");
    if(sidebar && btn && !sidebar.contains(e.target) && !btn.contains(e.target)) {
        sidebar.style.left = "-260px";
    }
});
</script>
